<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Étape 4 - Terminé</title>
  <style>
    :root{
      --bg:#0b1220;
      --panel:#111a2e;
      --border:rgba(255,255,255,0.08);
      --text:#f8fafc;
      --muted:#94a3b8;
      --primary:#3b82f6;
      --primary-hover:#2563eb;
      --secondary:rgba(255,255,255,0.06);
      --success:#22c55e;
      --shadow:0 20px 50px rgba(0,0,0,.35);
    }

    *{box-sizing:border-box;margin:0;padding:0;font-family:Inter,Arial,sans-serif;}

    body{
      min-height:100vh;
      background:
        radial-gradient(circle at top, rgba(59,130,246,.18), transparent 30%),
        linear-gradient(180deg,#0b1220 0%,#0f172a 100%);
      color:var(--text);
      padding:20px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .app{width:100%;max-width:760px;}

    .card{
      background:rgba(17,26,46,.9);
      border:1px solid var(--border);
      border-radius:30px;
      box-shadow:var(--shadow);
      padding:28px;
      text-align:center;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:22px;
      flex-wrap:wrap;
      text-align:left;
    }

    .badge{
      font-size:13px;
      color:#bfdbfe;
      background:rgba(59,130,246,.12);
      border:1px solid rgba(59,130,246,.25);
      padding:8px 14px;
      border-radius:999px;
    }

    .step{font-size:13px;color:var(--muted);}

    .icon{
      width:82px;
      height:82px;
      border-radius:24px;
      background:rgba(34,197,94,.12);
      border:1px solid rgba(34,197,94,.25);
      color:#bbf7d0;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:34px;
      font-weight:700;
      margin:0 auto 18px;
    }

    h1{
      font-size:34px;
      line-height:1.1;
      margin-bottom:12px;
      letter-spacing:-0.02em;
    }

    .subtitle{
      color:var(--muted);
      line-height:1.7;
      font-size:15px;
      max-width:560px;
      margin:0 auto 24px;
    }

    .actions{
      display:flex;
      justify-content:center;
      gap:12px;
      flex-wrap:wrap;
      margin-top:10px;
    }

    .btn{
      text-decoration:none;
      border:none;
      padding:14px 18px;
      border-radius:16px;
      font-weight:700;
      font-size:15px;
      cursor:pointer;
      transition:.2s ease;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }

    .btn-primary{
      background:var(--primary);
      color:#fff;
      box-shadow:0 10px 25px rgba(59,130,246,.22);
    }

    .btn-primary:hover{
      background:var(--primary-hover);
      transform:translateY(-1px);
    }

    .btn-secondary{
      background:var(--secondary);
      color:#fff;
      border:1px solid var(--border);
    }

    @media (max-width:520px){
      .card{padding:20px;}
      h1{font-size:28px;}
      .actions{flex-direction:column;}
      .btn{width:100%;}
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="card">
      <div class="topbar">
        <div class="badge">Mini App Telegram</div>
        <div class="step">Étape 4 sur 4</div>
      </div>

      <div class="icon">✓</div>
      <h1>Installation terminée</h1>
      <p class="subtitle">
        Le parcours est terminé. Tu peux revenir en arrière, recommencer le processus ou fermer la page.
      </p>

      <div class="actions">
        <a href="step3.html" class="btn btn-secondary">Retour</a>
        <a href="step1.html" class="btn btn-primary">Recommencer</a>
      </div>
    </section>
  </div>
</body>
</html>
