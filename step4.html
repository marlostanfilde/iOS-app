<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Étape 4 - Fin</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: rgba(255, 255, 255, 0.08);
      --card-border: rgba(255, 255, 255, 0.12);
      --text: #f8fafc;
      --muted: #cbd5e1;
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --success: #22c55e;
      --radius: 22px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
    body {
      background: linear-gradient(180deg, #0f172a 0%, #111827 100%);
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      width: 100%;
      max-width: 700px;
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 28px;
      text-align: center;
    }
    .step { color: #93c5fd; margin-bottom: 10px; font-size: 14px; }
    h1 { font-size: 28px; margin-bottom: 10px; }
    p { color: var(--muted); line-height: 1.7; }
    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 18px;
      border-radius: 50%;
      background: rgba(34,197,94,0.16);
      border: 1px solid rgba(34,197,94,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      font-weight: bold;
      color: #bbf7d0;
    }
    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 22px;
    }
    .btn {
      border: none;
      text-decoration: none;
      padding: 13px 18px;
      border-radius: 14px;
      font-weight: bold;
      cursor: pointer;
      display: inline-flex;
      justify-content: center;
      align-items: center;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-secondary {
      background: rgba(255,255,255,0.08);
      color: white;
      border: 1px solid var(--card-border);
    }
    @media (max-width: 520px) {
      .actions { flex-direction: column; }
      .btn { width: 100%; }
      h1 { font-size: 24px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="step">Étape 4 sur 4</div>
    <div class="icon">✓</div>
    <h1>Installation terminée</h1>
    <p>Le parcours est terminé. Vous pouvez recommencer si nécessaire.</p>

    <div class="actions">
      <a class="btn btn-secondary" href="step3.html">Retour</a>
      <a class="btn btn-primary" href="step1.html">Recommencer</a>
    </div>
  </div>
</body>
</html>
